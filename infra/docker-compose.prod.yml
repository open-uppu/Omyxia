name: omyxia

services:
  postgres:
    image: postgres:16-alpine
    container_name: omyxia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omyxia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-omyxia}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omyxia} -d ${POSTGRES_DB:-omyxia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: omyxia-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: omyxia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  stalwart:
    image: stalwartlabs/stalwart:1.0.0
    container_name: omyxia-stalwart
    restart: unless-stopped
    hostname: ${STALWART_HOSTNAME:-mail.omyxia.local}
    environment:
      STALWART_HOSTNAME: ${STALWART_HOSTNAME:-mail.omyxia.local}
      STALWART_DOMAIN: ${STALWART_DOMAIN:-omyxia.local}
    volumes:
      - stalwart_data:/opt/stalwart-mail
    networks:
      - internal
      - external
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: omyxia-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-omyxia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-omyxia}
      DIRECT_URL: postgresql://${POSTGRES_USER:-omyxia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-omyxia}
      REDIS_URL: redis://redis:6379
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: stalwart
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      IMAP_HOST: stalwart
      IMAP_PORT: 143
      IMAP_USER: ${SMTP_USER}
      IMAP_PASS: ${SMTP_PASS}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: omyxia-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${WEB_URL:-http://localhost:3000}
      API_INTERNAL_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - external
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  caddy:
    image: caddy:2.8-alpine
    container_name: omyxia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - external
    depends_on:
      - web
      - api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  minio_data:
  stalwart_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge